# Template: auto-run INIT.md once after the starter has been bootstrapped.
# Copy this file to .github/workflows/ in the host project to enable.
#
# Triggers:
#   - workflow_dispatch (manual)
#   - first push to main containing .starter-meta.json (the "I just bootstrapped" signal)
#
# Idempotent: skips if .specs/product/VISION.md is already non-template
# (the file no longer contains the literal "<VISION_ONELINER>" placeholder).
#
# Required secrets (configure under Settings > Secrets):
#   ANTHROPIC_API_KEY  -> if using Claude Code action
#   OPENAI_API_KEY     -> if using Codex (alternative path)

name: Auto-init starter

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.starter-meta.json'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: starter-init
  cancel-in-progress: false

jobs:
  init:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if already initialized
        id: gate
        run: |
          set -euo pipefail
          if [ ! -f .specs/product/VISION.md ]; then
            echo "starter not installed; nothing to init"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! grep -q '<VISION_ONELINER>' .specs/product/VISION.md; then
            echo "VISION.md already filled — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      # Replace this step with the action of your choice (Claude / Codex / etc).
      # Reference action available at: https://github.com/anthropics/claude-code-action
      - name: Run INIT.md via Claude Code action
        if: steps.gate.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt-file: INIT.md

      - name: Open PR with init results
        if: steps.gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "agent produced no changes"
            exit 0
          fi
          BRANCH="chore/starter-init-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add -A
          git -c user.email=actions@github.com -c user.name="github-actions[bot]" \
            commit -m "chore(specs): fill starter docs from INIT.md run"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore(specs): starter init results" \
            --body "Auto-generated by .github/workflows/llm-project-mapper-init.yml" \
            --base main \
            --head "$BRANCH" \
            --draft
