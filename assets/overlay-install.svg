<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">LLM Project Mapper overlay install screencast</title>
  <desc id="desc">Animated terminal screencast showing cd into host-project, running npx @wesleysimplicio/llm-project-mapper, answering prompts, bootstrapping, and listing the .specs folders.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" x2="100%" y1="0%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>
  <style>
    .mono {
      font-family: "SFMono-Regular", "Menlo", "Monaco", "Consolas", "Liberation Mono", monospace;
    }
    .ui {
      font-family: "Inter", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    }
    .line {
      opacity: 0;
      animation-duration: 24s;
      animation-iteration-count: infinite;
      animation-timing-function: linear;
      animation-fill-mode: both;
    }
    .line-1 { animation-name: show-1; }
    .line-2 { animation-name: show-2; }
    .line-3 { animation-name: show-3; }
    .line-4 { animation-name: show-4; }
    .line-5 { animation-name: show-5; }
    .line-6 { animation-name: show-6; }
    .line-7 { animation-name: show-7; }
    .line-8 { animation-name: show-8; }
    .line-9 { animation-name: show-9; }
    .cursor {
      animation: blink 1s steps(1, end) infinite;
    }
    .progress {
      transform-origin: 96px 652px;
      animation: progress 24s linear infinite;
    }
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes progress {
      0% { transform: scaleX(0); }
      100% { transform: scaleX(1); }
    }
    @keyframes show-1 {
      0%, 3% { opacity: 0; }
      6%, 100% { opacity: 1; }
    }
    @keyframes show-2 {
      0%, 11% { opacity: 0; }
      14%, 100% { opacity: 1; }
    }
    @keyframes show-3 {
      0%, 24% { opacity: 0; }
      27%, 100% { opacity: 1; }
    }
    @keyframes show-4 {
      0%, 34% { opacity: 0; }
      37%, 100% { opacity: 1; }
    }
    @keyframes show-5 {
      0%, 43% { opacity: 0; }
      46%, 100% { opacity: 1; }
    }
    @keyframes show-6 {
      0%, 56% { opacity: 0; }
      59%, 100% { opacity: 1; }
    }
    @keyframes show-7 {
      0%, 68% { opacity: 0; }
      71%, 100% { opacity: 1; }
    }
    @keyframes show-8 {
      0%, 80% { opacity: 0; }
      83%, 100% { opacity: 1; }
    }
    @keyframes show-9 {
      0%, 88% { opacity: 0; }
      91%, 100% { opacity: 1; }
    }
  </style>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="112" cy="92" r="140" fill="#1d4ed8" opacity="0.18"/>
  <circle cx="1052" cy="110" r="180" fill="#0f766e" opacity="0.14"/>
  <circle cx="1034" cy="640" r="210" fill="#6d28d9" opacity="0.16"/>

  <text class="ui" x="96" y="84" fill="#e2e8f0" font-size="36" font-weight="700">Overlay install in 24 seconds</text>
  <text class="ui" x="96" y="116" fill="#93c5fd" font-size="18">Animated SVG screencast for README and INSTALL docs</text>
  <text class="ui" x="96" y="146" fill="#94a3b8" font-size="17">Host project stays in control. Starter files land locally, bootstrap runs, and <tspan fill="#e2e8f0">.specs/</tspan> is ready.</text>

  <g filter="url(#shadow)">
    <rect x="84" y="178" width="1032" height="458" rx="28" fill="#0b1220" opacity="0.96"/>
    <rect x="84" y="178" width="1032" height="52" rx="28" fill="#111c33"/>
    <rect x="84" y="204" width="1032" height="432" fill="#0b1220"/>
    <circle cx="124" cy="204" r="8" fill="#fb7185"/>
    <circle cx="152" cy="204" r="8" fill="#fbbf24"/>
    <circle cx="180" cy="204" r="8" fill="#4ade80"/>
    <text class="ui" x="212" y="211" fill="#cbd5e1" font-size="18" font-weight="600">host-project overlay walkthrough</text>
    <text class="ui" x="942" y="211" fill="#94a3b8" font-size="16">LLM Project Mapper</text>
  </g>

  <g class="mono" font-size="25">
    <g class="line line-1">
      <text x="118" y="276">
        <tspan fill="#4ade80">wesley@host:~/code$</tspan>
        <tspan dx="18" fill="#e2e8f0">cd host-project</tspan>
      </text>
    </g>
    <g class="line line-2">
      <text x="118" y="320">
        <tspan fill="#4ade80">wesley@host:~/code/host-project$</tspan>
        <tspan dx="18" fill="#e2e8f0">npx @wesleysimplicio/llm-project-mapper</tspan>
      </text>
    </g>
    <g class="line line-3">
      <text x="118" y="376">
        <tspan fill="#fbbf24">?</tspan>
        <tspan dx="12" fill="#f8fafc">Which CLI/LLM should receive INIT.md?</tspan>
        <tspan dx="12" fill="#38bdf8">codex [installed]</tspan>
      </text>
    </g>
    <g class="line line-4">
      <text x="118" y="414">
        <tspan fill="#fbbf24">?</tspan>
        <tspan dx="12" fill="#f8fafc">Append recommended ignores to .gitignore?</tspan>
        <tspan dx="12" fill="#38bdf8">no</tspan>
      </text>
    </g>
    <g class="line line-5">
      <text x="118" y="466">
        <tspan fill="#22c55e">✓</tspan>
        <tspan dx="12" fill="#d1fae5">Scaffold ready</tspan>
        <tspan dx="12" fill="#93c5fd">wrote AGENTS.md, .specs/, .skills/, .claude/</tspan>
      </text>
    </g>
    <g class="line line-6">
      <text x="118" y="520">
        <tspan fill="#4ade80">wesley@host:~/code/host-project$</tspan>
        <tspan dx="18" fill="#e2e8f0">./bootstrap.sh</tspan>
      </text>
    </g>
    <g class="line line-7">
      <text x="118" y="564">
        <tspan fill="#22c55e">✓</tspan>
        <tspan dx="12" fill="#d1fae5">.starter-meta.json generated</tspan>
        <tspan dx="12" fill="#93c5fd">stack=nextjs • project_mode=root</tspan>
      </text>
    </g>
    <g class="line line-8">
      <text x="118" y="608">
        <tspan fill="#4ade80">wesley@host:~/code/host-project$</tspan>
        <tspan dx="18" fill="#e2e8f0">ls .specs/</tspan>
        <tspan class="cursor" dx="6" fill="#38bdf8">_</tspan>
      </text>
    </g>
    <g class="line line-9">
      <text x="167" y="640" fill="#93c5fd">architecture  product  sprints  workflow</text>
    </g>
  </g>

  <rect x="96" y="652" width="1008" height="10" rx="5" fill="#17233b"/>
  <rect class="progress" x="96" y="652" width="1008" height="10" rx="5" fill="url(#shine)"/>

  <g class="ui">
    <rect x="96" y="680" width="202" height="22" rx="11" fill="#132039"/>
    <text x="114" y="696" fill="#93c5fd" font-size="14" font-weight="700">gitignored overlay</text>
    <rect x="314" y="680" width="258" height="22" rx="11" fill="#132039"/>
    <text x="332" y="696" fill="#c4b5fd" font-size="14" font-weight="700">no host overwrite with --ignore-existing</text>
    <rect x="588" y="680" width="246" height="22" rx="11" fill="#132039"/>
    <text x="606" y="696" fill="#86efac" font-size="14" font-weight="700">bootstrap + .specs/ verification</text>
  </g>
</svg>
